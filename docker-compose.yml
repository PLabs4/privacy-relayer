# Standalone deployment for the privacy-relayer (HTTP `serve` mode).
#
#   cp .env.example .env   # then edit RPC URL, chain id, relayer key, …
#   docker compose up -d --build
#
# The relayer broadcasts client-signed/encoded calldata via /submit_raw so that a
# holder's EOA never appears on-chain. The relayer pays gas from its own key.
#
# Layer 1 screening (SCREENING_ENABLED=true in .env) makes outbound HTTPS calls to
# TRM / Chainalysis — ensure the deployment network allows egress to those hosts.
# All SCREENING_* vars are read from the env_file below; no structural change needed.
services:
  relayer:
    build: .
    image: privacy-relayer:latest
    restart: unless-stopped
    env_file: .env
    environment:
      # Bind on all interfaces inside the container; the host mapping below is
      # loopback-only by default so production traffic must enter via an
      # authenticated/rate-limited reverse proxy.
      PRIVACYBTC_RELAYER_BIND: 0.0.0.0:8790
      # Durable LP swap matching state. Keep this on a persistent volume.
      PRIVACYBTC_SWAP_BOOK_PATH: /data/swap-book.json
    ports:
      - "${RELAYER_HOST_BIND:-127.0.0.1}:${RELAYER_HOST_PORT:-8790}:8790"
    volumes:
      - relayer-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8790/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  relayer-data:
