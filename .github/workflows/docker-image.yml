# Build and push the privacy-relayer image to GHCR on version tags.
#
# Production hosts then deploy with `docker compose pull && up -d` — no Rust
# toolchain, reproducible rollbacks by tag (see the perc20-deploy repo).
name: docker-image

env:
  PERC20_PROTOCOL_VERSION: perc20-v1

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/privacy-relayer
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=sha,format=long
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            io.perc20.protocol=${{ env.PERC20_PROTOCOL_VERSION }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          # Production servers are x86_64. Add linux/arm64 if you also deploy
          # to ARM hosts (Rust cross-builds under QEMU are slow).
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Record immutable release input
        run: |
          echo "privacy-relayer=${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo "source_commit=${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo "protocol=${PERC20_PROTOCOL_VERSION}" >> "$GITHUB_STEP_SUMMARY"
